<!DOCTYPE html>
<!--
  ============================================================
  REPORT DISPLAY (report_display.html)
  Grist Report Widget — displays a single locked report
  Output: widget reports only
  GitHub repo: grist-report-display
  ============================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grist Report Display</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <script defer src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; background: #fff; }
        .report-loading { text-align: center; padding: 40px; color: #999; font-size: 13px; }
        .report-error { text-align: center; padding: 40px; color: #e53935; font-size: 13px; }
        .report-select { max-width: 400px; margin: 40px auto; text-align: center; }
        .report-select h2 { font-size: 16px; margin-bottom: 12px; color: #555; }
        .report-select select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
        .report-select button { margin-top: 12px; padding: 8px 20px; background: #16b378; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        @media print { body { padding: 0; } }
    </style>
</head>
<body>
<div id="app"><div class="report-loading">Connecting to Grist...</div></div>
<script>
(async function() {
    "use strict";
    const REPORTS_TABLE = "SysReports";
    const WIDGET_NAME = "Report Display";
    const WIDGET_VERSION = "1.1.0";
    const app = document.getElementById("app");

    grist.ready({ requiredAccess: "full", columns: [] });

    async function fetchTable(tableId) {
        const data = await grist.docApi.fetchTable(tableId);
        const columns = Object.keys(data);
        if (columns.length === 0) return [];
        const rowCount = data.id ? data.id.length : data[columns[0]].length;
        const rows = [];
        for (let i = 0; i < rowCount; i++) {
            const row = {};
            for (const col of columns) row[col] = data[col][i];
            rows.push(row);
        }
        return rows;
    }

    // ── Helpers (same as report_writer) ────────────────────────────────────
    const H = Handlebars;
    H.registerHelper("eq", (a, b) => a === b);
    H.registerHelper("neq", (a, b) => a !== b);
    H.registerHelper("gt", (a, b) => a > b);
    H.registerHelper("lt", (a, b) => a < b);
    H.registerHelper("gte", (a, b) => a >= b);
    H.registerHelper("lte", (a, b) => a <= b);
    H.registerHelper("and", (a, b) => a && b);
    H.registerHelper("or", (a, b) => a || b);
    H.registerHelper("not", (a) => !a);
    H.registerHelper("add", (a, b) => Number(a) + Number(b));
    H.registerHelper("subtract", (a, b) => Number(a) - Number(b));
    H.registerHelper("multiply", (a, b) => Number(a) * Number(b));
    H.registerHelper("divide", (a, b) => b !== 0 ? Number(a) / Number(b) : 0);
    H.registerHelper("mod", (a, b) => b !== 0 ? Number(a) % Number(b) : 0);
    H.registerHelper("percent", (a, b) => b !== 0 ? ((a / b) * 100).toFixed(1) + "%" : "0%");
    H.registerHelper("round", (n, d) => Number(n).toFixed(typeof d === "number" ? d : 0));
    H.registerHelper("count", (arr) => Array.isArray(arr) ? arr.length : 0);
    H.registerHelper("sum", function(arr, key) { if (!Array.isArray(arr)) return 0; return arr.reduce((s, i) => s + (Number(i[key]) || 0), 0); });
    H.registerHelper("avg", function(arr, key) { if (!Array.isArray(arr) || !arr.length) return 0; return (arr.reduce((s, i) => s + (Number(i[key]) || 0), 0) / arr.length).toFixed(1); });
    H.registerHelper("max", function(arr, key) { if (!Array.isArray(arr) || !arr.length) return 0; return Math.max(...arr.map(i => Number(i[key]) || 0)); });
    H.registerHelper("min", function(arr, key) { if (!Array.isArray(arr) || !arr.length) return 0; return Math.min(...arr.map(i => Number(i[key]) || 0)); });
    H.registerHelper("unique", function(arr, key) { if (!Array.isArray(arr)) return []; return [...new Set(arr.map(i => i[key]).filter(Boolean))]; });
    H.registerHelper("groupBy", function(arr, key, options) { if (!Array.isArray(arr)) return ""; const g = {}; arr.forEach(i => { const k = i[key] || "(blank)"; if (!g[k]) g[k] = []; g[k].push(i); }); let o = ""; for (const [k, items] of Object.entries(g)) o += options.fn({ key: k, items, count: items.length }); return o; });
    H.registerHelper("filterBy", function(arr, key, value, options) { if (!Array.isArray(arr)) return ""; const f = arr.filter(i => i[key] === value); return options.fn({ items: f, count: f.length }); });
    H.registerHelper("sortBy", function(arr, key, dir) { if (!Array.isArray(arr)) return []; const s = [...arr].sort((a, b) => a[key] < b[key] ? -1 : a[key] > b[key] ? 1 : 0); return dir === "desc" ? s.reverse() : s; });
    H.registerHelper("formatDate", (val) => { if (!val) return ""; return new Date(val * 1000).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); });
    H.registerHelper("formatDateTime", (val) => { if (!val) return ""; const d = new Date(val * 1000); return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) + " " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }); });
    H.registerHelper("now", () => new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }));
    H.registerHelper("year", (val) => val ? new Date(val * 1000).getFullYear() : new Date().getFullYear());
    H.registerHelper("monthName", (m) => ["January","February","March","April","May","June","July","August","September","October","November","December"][m] || "");
    H.registerHelper("dayOfWeek", (val) => { const d = new Date(val * 1000); return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]; });
    H.registerHelper("uppercase", (s) => String(s || "").toUpperCase());
    H.registerHelper("lowercase", (s) => String(s || "").toLowerCase());
    H.registerHelper("truncate", (s, len) => { const str = String(s || ""); return str.length > len ? str.slice(0, len) + "..." : str; });
    H.registerHelper("replace", (s, find, rep) => String(s || "").replace(new RegExp(find, "g"), rep));
    H.registerHelper("json", (obj) => JSON.stringify(obj));
    H.registerHelper("pageBreak", () => new H.SafeString('<div style="page-break-after: always;"></div>'));
    H.registerHelper("columns", function(count, options) { return new H.SafeString(`<div style="column-count:${count}; column-gap:16px;">${options.fn(this)}</div>`); });
    H.registerHelper("progressBar", function(value, max) { const pct = max > 0 ? Math.min(100, Math.round((value / max) * 100)) : 0; return new H.SafeString(`<div style="background:#eee;border-radius:4px;height:8px;width:100%;overflow:hidden;"><div style="background:#16b378;height:100%;width:${pct}%;border-radius:4px;"></div></div>`); });
    H.registerHelper("stars", function(value, max) { const m = max || 5; const v = Math.round(Number(value) || 0); let s = ""; for (let i = 1; i <= m; i++) s += i <= v ? "★" : "☆"; return new H.SafeString(`<span style="color:#f4a261;letter-spacing:1px;">${s}</span>`); });
    H.registerHelper("initials", function(name) { const parts = String(name || "").split(" ").filter(Boolean); const ini = parts.map(p => p[0]).join("").toUpperCase().slice(0, 2); const colours = ["#16b378","#e63946","#457b9d","#f4a261","#6a4c93","#2a9d8f","#e76f51","#264653"]; const colour = colours[ini.charCodeAt(0) % colours.length]; return new H.SafeString(`<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${colour};color:#fff;font-size:11px;font-weight:700;">${ini}</span>`); });
    H.registerHelper("timeAgo", function(timestamp) { if (!timestamp) return ""; const now = Date.now() / 1000; const diff = now - timestamp; if (diff < 60) return "just now"; if (diff < 3600) return Math.floor(diff / 60) + " min ago"; if (diff < 86400) return Math.floor(diff / 3600) + " hours ago"; if (diff < 2592000) return Math.floor(diff / 86400) + " days ago"; if (diff < 31536000) return Math.floor(diff / 2592000) + " months ago"; return Math.floor(diff / 31536000) + " years ago"; });
    H.registerHelper("formatNumber", function(n) { return Number(n || 0).toLocaleString("en-GB"); });
    H.registerHelper("currency", function(value, code) { const c = code || "GBP"; try { return Number(value || 0).toLocaleString("en-GB", { style: "currency", currency: c }); } catch(e) { return Number(value || 0).toFixed(2); } });
    H.registerHelper("watermark", function(text) { return new H.SafeString(`<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:80px;font-weight:700;color:rgba(0,0,0,0.04);pointer-events:none;z-index:0;white-space:nowrap;">${text || "DRAFT"}</div>`); });
    H.registerHelper("signatureLine", function(label) { return new H.SafeString(`<div style="margin-top:40px;padding-top:8px;border-top:1px solid #333;width:250px;font-size:11px;color:#666;">${label || "Signature"}</div>`); });
    H.registerHelper("labels", function(cols, options) { const c = Number(cols) || 3; return new H.SafeString(`<div style="display:grid;grid-template-columns:repeat(${c},1fr);gap:8px;">${options.fn(this)}</div>`); });

    // ── String helpers (extended) ─────────────────────────────────────────
    H.registerHelper("concat", function() { const args = Array.prototype.slice.call(arguments, 0, -1); return args.join(""); });
    H.registerHelper("contains", function(str, sub) { return String(str || "").toLowerCase().includes(String(sub || "").toLowerCase()); });
    H.registerHelper("startsWith", function(str, prefix) { return String(str || "").startsWith(String(prefix || "")); });
    H.registerHelper("endsWith", function(str, suffix) { return String(str || "").endsWith(String(suffix || "")); });
    H.registerHelper("split", function(str, sep) { return String(str || "").split(sep || ",").map(s => s.trim()).filter(Boolean); });
    H.registerHelper("join", function(arr, sep) { if (!Array.isArray(arr)) return ""; return arr.join(typeof sep === "string" ? sep : ", "); });
    H.registerHelper("nl2br", function(str) { return new H.SafeString(String(str || "").replace(/\n/g, "<br>")); });
    H.registerHelper("stripHtml", function(str) { return String(str || "").replace(/<[^>]*>/g, ""); });
    H.registerHelper("padStart", function(str, len, char) { return String(str || "").padStart(Number(len) || 2, char || "0"); });
    H.registerHelper("padEnd", function(str, len, char) { return String(str || "").padEnd(Number(len) || 2, char || " "); });
    H.registerHelper("encodeURI", function(str) { return encodeURIComponent(String(str || "")); });
    H.registerHelper("pluralize", function(count, singular, plural) { const n = Number(count) || 0; const p = typeof plural === "string" ? plural : singular + "s"; return n === 1 ? singular : p; });
    H.registerHelper("default", function(value, fallback) { return (value !== undefined && value !== null && value !== "") ? value : fallback; });
    H.registerHelper("coalesce", function() { const args = Array.prototype.slice.call(arguments, 0, -1); for (const a of args) { if (a !== undefined && a !== null && a !== "") return a; } return ""; });

    // ── Math helpers (extended) ───────────────────────────────────────────
    H.registerHelper("abs", (n) => Math.abs(Number(n) || 0));
    H.registerHelper("ceil", (n) => Math.ceil(Number(n) || 0));
    H.registerHelper("floor", (n) => Math.floor(Number(n) || 0));
    H.registerHelper("pow", (base, exp) => Math.pow(Number(base) || 0, Number(exp) || 1));
    H.registerHelper("sqrt", (n) => Math.sqrt(Number(n) || 0));
    H.registerHelper("clamp", (n, min, max) => Math.max(Number(min), Math.min(Number(max), Number(n))));

    // ── Date helpers (extended) ───────────────────────────────────────────
    H.registerHelper("daysUntil", function(timestamp) { if (!timestamp) return 0; return Math.ceil((new Date(timestamp * 1000) - new Date()) / 86400000); });
    H.registerHelper("daysSince", function(timestamp) { if (!timestamp) return 0; return Math.floor((new Date() - new Date(timestamp * 1000)) / 86400000); });
    H.registerHelper("dateAdd", function(timestamp, days) { if (!timestamp) return ""; const d = new Date(timestamp * 1000); d.setDate(d.getDate() + (Number(days) || 0)); return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); });
    H.registerHelper("dateDiff", function(ts1, ts2, unit) { if (!ts1 || !ts2) return 0; const diff = Math.abs((ts1 - ts2) * 1000); if (unit === "hours") return Math.floor(diff / 3600000); if (unit === "minutes") return Math.floor(diff / 60000); if (unit === "weeks") return Math.floor(diff / 604800000); if (unit === "months") return Math.floor(diff / 2592000000); if (unit === "years") return Math.floor(diff / 31536000000); return Math.floor(diff / 86400000); });
    H.registerHelper("isOverdue", function(timestamp) { if (!timestamp) return false; return (timestamp * 1000) < Date.now(); });
    H.registerHelper("isFuture", function(timestamp) { if (!timestamp) return false; return (timestamp * 1000) > Date.now(); });
    H.registerHelper("isToday", function(timestamp) { if (!timestamp) return false; return new Date(timestamp * 1000).toDateString() === new Date().toDateString(); });
    H.registerHelper("quarter", function(timestamp) { if (!timestamp) return ""; return "Q" + (Math.floor(new Date(timestamp * 1000).getMonth() / 3) + 1); });
    H.registerHelper("weekNumber", function(timestamp) { if (!timestamp) return 0; const d = new Date(timestamp * 1000); const start = new Date(d.getFullYear(), 0, 1); return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7); });

    // ── Conditional aggregation ───────────────────────────────────────────
    H.registerHelper("countIf", function(arr, key, value) { if (!Array.isArray(arr)) return 0; return arr.filter(r => r[key] === value).length; });
    H.registerHelper("sumIf", function(arr, sumField, condField, condValue) { if (!Array.isArray(arr)) return 0; return arr.filter(r => r[condField] === condValue).reduce((s, r) => s + (Number(r[sumField]) || 0), 0); });
    H.registerHelper("avgIf", function(arr, avgField, condField, condValue) { if (!Array.isArray(arr)) return 0; const filtered = arr.filter(r => r[condField] === condValue); if (!filtered.length) return 0; return (filtered.reduce((s, r) => s + (Number(r[avgField]) || 0), 0) / filtered.length).toFixed(1); });
    H.registerHelper("first", function(arr, n) { if (!Array.isArray(arr)) return []; return arr.slice(0, Number(n) || 1); });
    H.registerHelper("last", function(arr, n) { if (!Array.isArray(arr)) return []; return arr.slice(-(Number(n) || 1)); });
    H.registerHelper("nth", function(arr, index) { if (!Array.isArray(arr)) return null; return arr[Number(index) || 0]; });
    H.registerHelper("pluck", function(arr, key) { if (!Array.isArray(arr)) return []; return arr.map(r => r[key]).filter(v => v !== undefined); });
    H.registerHelper("rank", function(arr, key, current) { if (!Array.isArray(arr)) return 0; const sorted = [...arr].sort((a, b) => (Number(b[key]) || 0) - (Number(a[key]) || 0)); return sorted.findIndex(r => r[key] === current) + 1; });
    H.registerHelper("runningTotal", function(arr, key, index) { if (!Array.isArray(arr)) return 0; let total = 0; for (let i = 0; i <= Math.min(Number(index), arr.length - 1); i++) { total += Number(arr[i][key]) || 0; } return total; });
    H.registerHelper("lookup", function(arr, key, value, returnField) { if (!Array.isArray(arr)) return ""; const found = arr.find(r => r[key] === value); return found ? (found[returnField] || "") : ""; });

    // ── Visual/layout helpers (extended) ──────────────────────────────────
    H.registerHelper("statusBadge", function(value) { const colours = { active: "#16b378", open: "#16b378", won: "#16b378", completed: "#16b378", closed: "#e53935", lost: "#e53935", cancelled: "#e53935", pending: "#f4a261", "in progress": "#457b9d", draft: "#999", new: "#6a4c93" }; const v = String(value || "").toLowerCase(); const bg = colours[v] || "#999"; return new H.SafeString(`<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${bg};color:#fff;font-size:10px;font-weight:600;text-transform:uppercase;">${value || ""}</span>`); });
    H.registerHelper("image", function(url, alt, width) { const w = width || "auto"; const a = alt || ""; if (!url) return new H.SafeString(`<span style="display:inline-block;width:${w};height:${w};background:#eee;border-radius:4px;"></span>`); return new H.SafeString(`<img src="${url}" alt="${a}" style="max-width:${typeof w === "number" ? w + "px" : w};height:auto;border-radius:4px;" onerror="this.style.display='none'">`); });
    H.registerHelper("phoneLink", function(phone) { if (!phone) return ""; const clean = String(phone).replace(/[^\d+]/g, ""); return new H.SafeString(`<a href="tel:${clean}" style="color:#16b378;text-decoration:none;">${phone}</a>`); });
    H.registerHelper("emailLink", function(email) { if (!email) return ""; return new H.SafeString(`<a href="mailto:${email}" style="color:#16b378;text-decoration:none;">${email}</a>`); });
    H.registerHelper("link", function(url, text) { if (!url) return ""; const label = text || url; return new H.SafeString(`<a href="${url}" target="_blank" style="color:#16b378;text-decoration:none;">${label}</a>`); });
    H.registerHelper("address", function(options) { const h = options.hash || {}; const parts = [h.line1, h.line2, h.city, h.state, h.postcode, h.country].filter(Boolean); return new H.SafeString(parts.join("<br>")); });
    H.registerHelper("table", function(arr, columns) { if (!Array.isArray(arr) || !arr.length) return new H.SafeString("<p>No data</p>"); const cols = String(columns).split(",").map(c => c.trim()); let html = '<table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr>'; cols.forEach(c => { html += `<th style="border:1px solid #ddd;padding:4px 8px;background:#f5f5f5;text-align:left;">${c}</th>`; }); html += "</tr></thead><tbody>"; arr.forEach(r => { html += "<tr>"; cols.forEach(c => { html += `<td style="border:1px solid #ddd;padding:4px 8px;">${r[c] !== undefined && r[c] !== null ? r[c] : ""}</td>`; }); html += "</tr>"; }); html += "</tbody></table>"; return new H.SafeString(html); });
    H.registerHelper("rowNumber", function(index) { return (Number(index) || 0) + 1; });
    H.registerHelper("repeat", function(n, options) { let out = ""; for (let i = 0; i < (Number(n) || 0); i++) out += options.fn({ index: i }); return out; });
    H.registerHelper("isBetween", function(value, min, max) { const v = Number(value); return v >= Number(min) && v <= Number(max); });
    H.registerHelper("barcode", function(value, options) { if (!value) return ""; const h = (options && options.hash) || {}; const height = h.height || 40; const width = h.width || 1; return new H.SafeString(`<svg data-barcode="${value}" data-barcode-height="${height}" data-barcode-width="${width}"></svg>`); });

    // ── Chart data helpers ─────────────────────────────────────────────────
    H.registerHelper("groupCount", function(arr, field) {
        if (!Array.isArray(arr)) return {};
        const g = {}; arr.forEach(r => { const k = r[field] || "(blank)"; g[k] = (g[k] || 0) + 1; }); return g;
    });
    H.registerHelper("groupSum", function(arr, field, valueField) {
        if (!Array.isArray(arr)) return {};
        const g = {}; arr.forEach(r => { const k = r[field] || "(blank)"; g[k] = (g[k] || 0) + (Number(r[valueField]) || 0); }); return g;
    });
    H.registerHelper("groupAvg", function(arr, field, valueField) {
        if (!Array.isArray(arr)) return {};
        const g = {}; const c = {};
        arr.forEach(r => { const k = r[field] || "(blank)"; g[k] = (g[k] || 0) + (Number(r[valueField]) || 0); c[k] = (c[k] || 0) + 1; });
        const result = {}; for (const k of Object.keys(g)) result[k] = c[k] ? g[k] / c[k] : 0; return result;
    });
    H.registerHelper("keys", function(obj) { return Object.keys(obj || {}); });
    H.registerHelper("values", function(obj) { return Object.values(obj || {}); });
    H.registerHelper("chartConfig", function(type, arr, groupField, metrics, title) {
        if (!Array.isArray(arr)) return "{}";
        const colours = ["#16b378","#e63946","#457b9d","#f4a261","#6a4c93","#2a9d8f","#e76f51","#264653"];
        const g = {}; arr.forEach(r => { const k = r[groupField] || "(blank)"; if (!g[k]) g[k] = []; g[k].push(r); });
        const labels = Object.keys(g);
        const metricList = String(metrics).split(",").map(m => m.trim());
        const datasets = metricList.map((spec, i) => {
            const parts = spec.split(":"); const agg = parts[0]; const field = parts[1] || "";
            const label = parts[2] || (agg === "count" ? "Count" : agg.charAt(0).toUpperCase() + agg.slice(1) + " " + field);
            let data;
            if (agg === "count") data = labels.map(k => g[k].length);
            else if (agg === "sum") data = labels.map(k => g[k].reduce((s, r) => s + (Number(r[field]) || 0), 0));
            else if (agg === "avg") data = labels.map(k => { const a = g[k]; return a.length ? a.reduce((s, r) => s + (Number(r[field]) || 0), 0) / a.length : 0; });
            else data = labels.map(k => g[k].length);
            return { label, data, backgroundColor: colours[i % colours.length], borderColor: colours[i % colours.length], borderWidth: 1 };
        });
        const config = { type, data: { labels, datasets }, options: { responsive: true, plugins: { title: { display: !!title, text: title || "" }, legend: { display: datasets.length > 1 || type === "pie" || type === "doughnut" } }, scales: (type === "bar" || type === "line") ? { y: { beginAtZero: true } } : undefined } };
        return JSON.stringify(config);
    });

    // ── Rendering functions (same as report_writer) ────────────────────────
    const COLOURS = ["#16b378","#e63946","#457b9d","#f4a261","#6a4c93","#2a9d8f","#e76f51","#264653","#84a98c","#d62828","#003049","#fcbf49"];

    function renderCharts(container, data) {
        container.querySelectorAll("canvas[data-chart]").forEach(canvas => { try { new Chart(canvas, JSON.parse(canvas.dataset.chart)); } catch(e) {} });
        container.querySelectorAll("canvas[data-chart-type]").forEach(canvas => {
            try {
                const type = canvas.dataset.chartType, tableData = data[canvas.dataset.chartTable];
                const groupField = canvas.dataset.chartGroup, labelField = canvas.dataset.chartLabel;
                const valueField = canvas.dataset.chartValue, title = canvas.dataset.chartTitle || "";
                const datasetsAttr = canvas.dataset.chartDatasets || "";
                if (!Array.isArray(tableData)) return;

                let labels, datasets;

                if (datasetsAttr && groupField) {
                    const g = {};
                    tableData.forEach(r => { const k = r[groupField] || "(blank)"; if (!g[k]) g[k] = []; g[k].push(r); });
                    labels = Object.keys(g);
                    datasets = datasetsAttr.split(",").map((spec, si) => {
                        const parts = spec.trim().split(":");
                        const agg = parts[0];
                        const field = parts[1] || "";
                        const label = parts[2] || (agg === "count" ? "Count" : agg + " " + field);
                        let values;
                        if (agg === "count") values = labels.map(k => g[k].length);
                        else if (agg === "sum") values = labels.map(k => g[k].reduce((s, r) => s + (Number(r[field]) || 0), 0));
                        else if (agg === "avg") values = labels.map(k => { const arr = g[k]; return arr.length ? arr.reduce((s, r) => s + (Number(r[field]) || 0), 0) / arr.length : 0; });
                        else values = labels.map(k => g[k].length);
                        return { label, data: values, backgroundColor: COLOURS[si % COLOURS.length], borderColor: COLOURS[si % COLOURS.length], borderWidth: 1 };
                    });
                } else if (groupField) {
                    const g = {}; tableData.forEach(r => { const k = r[groupField] || "(blank)"; g[k] = (g[k] || 0) + (valueField ? (Number(r[valueField]) || 0) : 1); }); labels = Object.keys(g);
                    datasets = [{ label: title, data: Object.values(g), backgroundColor: type === "line" ? COLOURS[0] : labels.map((_, i) => COLOURS[i % COLOURS.length]), borderColor: type === "line" ? COLOURS[0] : undefined, borderWidth: type === "line" ? 2 : 1, fill: false }];
                } else {
                    labels = tableData.map(r => r[labelField] || ""); 
                    datasets = [{ label: title, data: tableData.map(r => Number(r[valueField]) || 0), backgroundColor: type === "line" ? COLOURS[0] : labels.map((_, i) => COLOURS[i % COLOURS.length]), borderColor: type === "line" ? COLOURS[0] : undefined, borderWidth: type === "line" ? 2 : 1, fill: false }];
                }

                new Chart(canvas, { type, data: { labels, datasets }, options: { responsive: true, plugins: { title: { display: !!title, text: title }, legend: { display: datasets.length > 1 || type === "pie" || type === "doughnut" } }, scales: (type === "bar" || type === "line") ? { y: { beginAtZero: true } } : undefined } });
            } catch(e) {}
        });
    }

    function renderMaps(container, data) {
        container.querySelectorAll("[data-map]").forEach(el => {
            try {
                const tableData = data[el.dataset.mapTable], latField = el.dataset.mapLat || "Latitude", lngField = el.dataset.mapLng || "Longitude";
                const labelField = el.dataset.mapLabel || "", colourField = el.dataset.mapColour || "";
                const useCluster = el.dataset.mapCluster === "true", useHeat = el.dataset.mapHeat === "true";
                if (!Array.isArray(tableData)) return;
                const points = tableData.filter(r => r[latField] && r[lngField] && r[latField] !== 0);
                if (points.length === 0) { el.innerHTML = "<p style='color:#999;text-align:center;padding:20px;'>No coordinates</p>"; return; }
                el.style.minHeight = el.style.height || "400px";
                const map = L.map(el).setView([points[0][latField], points[0][lngField]], 3);
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap" }).addTo(map);
                if (useHeat) { L.heatLayer(points.map(r => [Number(r[latField]), Number(r[lngField]), 1]), { radius: 20, blur: 15 }).addTo(map); }
                else { const colourMap = {}; let ci = 0; const layer = useCluster ? L.markerClusterGroup() : L.layerGroup(); points.forEach(r => { const lat = Number(r[latField]), lng = Number(r[lngField]); if (isNaN(lat) || isNaN(lng)) return; let c = COLOURS[0]; if (colourField && r[colourField]) { if (!colourMap[r[colourField]]) colourMap[r[colourField]] = COLOURS[ci++ % COLOURS.length]; c = colourMap[r[colourField]]; } const m = L.circleMarker([lat, lng], { radius: 6, fillColor: c, color: "#fff", weight: 1, fillOpacity: 0.8 }); if (labelField && r[labelField]) m.bindPopup(String(r[labelField])); layer.addLayer(m); }); map.addLayer(layer); }
                map.fitBounds(L.latLngBounds(points.map(r => [r[latField], r[lngField]])), { padding: [20, 20] });
            } catch(e) {}
        });
    }

    function renderQRCodes(container) { container.querySelectorAll("[data-qr]").forEach(el => { try { const v = el.dataset.qr, s = parseInt(el.dataset.qrSize) || 128; if (!v) return; const c = document.createElement("canvas"); QRCode.toCanvas(c, v, { width: s, margin: 1 }, () => el.appendChild(c)); } catch(e) {} }); }
    function renderBarcodes(container) { container.querySelectorAll("[data-barcode]").forEach(el => { try { const v = el.dataset.barcode, f = el.dataset.barcodeFormat || "CODE128"; if (!v) return; const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"); el.appendChild(svg); JsBarcode(svg, v, { format: f, height: 40, displayValue: true, fontSize: 12 }); } catch(e) {} }); }

    // ── Report renderer ────────────────────────────────────────────────────
    async function renderReport(report, selectedRecord) {
        app.innerHTML = `<div class="report-loading">Loading...</div>`;
        try {
            const mode = (report.Filter_Mode || "all").trim().toLowerCase();
            const targets = report.Data_Tables ? report.Data_Tables.split(",").map(t => t.trim()) : [];
            const primaryTable = report.Link_Table ? report.Link_Table.trim() : targets[0];
            const data = {};
            await Promise.all(targets.map(async (table) => { data[table] = await fetchTable(table); }));

            if (mode === "record" && selectedRecord && selectedRecord.id) {
                if (primaryTable && data[primaryTable]) data[primaryTable] = data[primaryTable].filter(row => row.id === selectedRecord.id);
                const selectedId = selectedRecord.id;
                for (const table of targets.filter(t => t !== primaryTable)) {
                    if (!data[table] || data[table].length === 0) continue;
                    const refCols = Object.keys(data[table][0] || {}).filter(col => col === primaryTable || col === primaryTable.replace(/s$/, "") || col === primaryTable + "_ID" || col === "Contact" || col === "Organisation");
                    if (refCols.length > 0) data[table] = data[table].filter(row => refCols.some(col => row[col] === selectedId));
                }
                data._selected = selectedRecord;
            }

            data._meta = { reportName: report.Report_Name, generatedAt: new Date().toLocaleString("en-GB"), recordCounts: {} };
            for (const [t, rows] of Object.entries(data)) { if (t !== "_meta" && t !== "_selected") data._meta.recordCounts[t] = Array.isArray(rows) ? rows.length : 0; }

            const template = H.compile(report.Template_HTML || "");
            const html = template(data);
            app.innerHTML = html;

            renderCharts(app, data);
            renderMaps(app, data);
            renderQRCodes(app);
            renderBarcodes(app);
        } catch(e) {
            app.innerHTML = `<div class="report-error">Error: ${e.message}</div>`;
        }
    }

    // ── Report selection UI ──────────────────────────────────────────────────
    let reports = [];
    let selectedReportId = null;
    let currentRecord = null;

    function showSelector() {
        if (reports.length === 0) { app.innerHTML = `<div class="report-error">No active reports found.</div>`; return; }
        let opts = reports.map(r => `<option value="${r.id}">${r.Report_Name}</option>`).join("");
        app.innerHTML = `<div class="report-select">
            <h2>Select Report to Display</h2>
            <select id="report-choice">${opts}</select>
            <br><button onclick="lockReport()">Lock This Report</button>
            <p style="font-size:11px; color:#999; margin-top:12px;">Once locked, this widget will always show the selected report.<br>To change, remove and re-add the widget.</p>
        </div>`;
    }

    window.lockReport = () => {
        const id = Number(document.getElementById("report-choice").value);
        selectedReportId = id;
        // Save selection via widget options
        grist.setOption("reportId", id);
        const report = reports.find(r => r.id === id);
        if (report) renderReport(report, currentRecord);
    };

    // ── Initialise ──────────────────────────────────────────────────────────
    grist.onRecord((record) => {
        if (record && record.id) {
            currentRecord = record;
            if (selectedReportId) {
                const report = reports.find(r => r.id === selectedReportId);
                if (report && (report.Filter_Mode || "all").trim() === "record") {
                    renderReport(report, currentRecord);
                }
            }
        }
    });

    grist.onOptions((options) => {
        if (options && options.reportId) {
            selectedReportId = Number(options.reportId);
        }
    });

    async function init() {
        try {
            reports = await fetchTable(REPORTS_TABLE);
            reports = reports.filter(r => r.Active === true);

            if (selectedReportId) {
                const report = reports.find(r => r.id === selectedReportId);
                if (report) { renderReport(report, currentRecord); return; }
            }
            showSelector();
        } catch(e) {
            app.innerHTML = `<div class="report-error">Error: ${e.message}</div>`;
        }
    }

    init();

})();
</script>
</body>
